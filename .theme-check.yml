root: .
ignore:
  - node_modules/**
  - .git/**
  - "*.min.*"

# Deshabilitar reglas que causan errores molestos
TemplateLength:
  enabled: false

TranslationKeyExists:
  enabled: false

UnusedAssign:
  enabled: false

UnusedSnippet:
  enabled: false

RequiredLayoutThemeObject:
  enabled: false

ValidJson:
  enabled: false

AssetSizeAppBlockJavaScript:
  enabled: false

AssetSizeAppBlockCSS:
  enabled: false

# Deshabilitar validaciones de archivos y assets
MissingAsset:
  enabled: false

MissingTemplate:
  enabled: false

ParserBlockingJavaScript:
  enabled: false

AssetUrlFilters:
  enabled: false

# Deshabilitar validaciones de sintaxis Liquid estricta
LiquidTag:
  enabled: false

DeprecateLazysizes:
  enabled: false

DeprecatedTags:
  enabled: false
